<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Oficios CPNB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 50px; font-family: sans-serif; }
        .card { max-width: 500px; margin: auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-cpnb { background-color: #1a3a5a; color: white; }
        .btn-cpnb:hover { background-color: #122a42; color: white; }
    </style>
</head>
<body>
    <div class="card p-4">
        <h4 class="text-center mb-4">Solicitud de Número de Oficio</h4>
        <form id="formOficio">
            <div class="mb-3">
                <label class="form-label text-secondary">Destinatario (PARA)</label>
                <input type="text" id="para" class="form-control" required placeholder="Ej. FISCALÍA SUPERIOR">
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Asunto</label>
                <textarea id="asunto" class="form-control" rows="2" required placeholder="Ej. REMISIÓN DE EXPEDIENTE"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Código de Oficina</label>
                <input type="password" id="token" class="form-control" required placeholder="Código secreto">
            </div>
            <button type="submit" class="btn btn-cpnb w-100">Generar Oficio</button>
        </form>
        <div id="mensaje" class="mt-4 text-center"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
